<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium radial gradient for the background -->
    <radialGradient id="emeraldGrad" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#0E2D27" />
      <stop offset="100%" stop-color="#05100D" />
    </radialGradient>

    <!-- Warm Brushed Brass metallic gradient -->
    <linearGradient id="brassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9E7B9" />
      <stop offset="30%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#C5A880" />
      <stop offset="100%" stop-color="#A67C1E" />
    </linearGradient>

    <!-- High-end drop shadow for emblem -->
    <filter id="luxuryGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Circular background badge with thin gold border -->
  <circle cx="256" cy="256" r="236" fill="url(#emeraldGrad)" stroke="url(#brassGrad)" stroke-width="12" />
  
  <!-- Subtle inner geometric accent circle -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#brassGrad)" stroke-width="2" stroke-dasharray="8, 6" opacity="0.4" />

  <!-- Stylized Geometric Serif Crown/Logo emblem -->
  <g filter="url(#luxuryGlow)">
    <!-- Elegant interlocking C and A luxury logo monogram -->
    <path d="M 200,200 
             C 140,200 140,312 200,312 
             C 230,312 245,290 250,280" 
          fill="none" 
          stroke="url(#brassGrad)" 
          stroke-width="26" 
          stroke-linecap="round" />
          
    <path d="M 245,320 L 290,180 L 335,320 M 260,280 L 320,280" 
          fill="none" 
          stroke="url(#brassGrad)" 
          stroke-width="24" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>
</svg>