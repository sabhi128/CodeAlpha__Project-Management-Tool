services:
  # 1. Express Backend Web Service
  - type: web
    name: codealpha-pm-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false # Pasted inside the Render dashboard by the user

  # 2. React Frontend Static Site
  - type: web
    name: codealpha-pm-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: codealpha-pm-backend
          property: host
